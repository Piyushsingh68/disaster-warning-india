name: Auto-Update Weather Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Fetch live weather for all 808 districts
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: python fetch_all_india.py

      - name: Copy fresh data into dashboard folder
        run: cp data/all_india_weather.json dashboard/Data/all_india_weather.json

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/Data/all_india_weather.json data/all_india_weather.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update weather data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
